<!DOCTYPE html>
<html>
<head>
  <title>Prevod mien</title>
</head>
<body>

  <h2>Prevod mien</h2>

  <p>Suma:</p>
  <input type="number" id="amount">

  <p>Z akej meny:</p>
  <select id="from">
    <option>EUR</option>
    <option>CZK</option>
    <option>USD</option>
    <option>GBP</option>
    <option>JPY</option>
    <option>CHF</option>
    <option>AUD</option>
    <option>CAD</option>
    <option>CNY</option>
    <option>SEK</option>
    <option>NZD</option>
    <option>PLN</option>
    <option>HUF</option>
    <option>TRY</option>
    <option>INR</option>
    <option>BRL</option>
    <option>ZAR</option>
    <option>MXN</option>
    <option>SGD</option>
    <option>HKD</option>
  </select>

  <p>Na akú menu:</p>
  <select id="to">
   <option>EUR</option>
    <option>CZK</option>
    <option>USD</option>
    <option>GBP</option>
    <option>JPY</option>
    <option>CHF</option>
    <option>AUD</option>
    <option>CAD</option>
    <option>CNY</option>
    <option>SEK</option>
    <option>NZD</option>
    <option>PLN</option>
    <option>HUF</option>
    <option>TRY</option>
    <option>INR</option>
    <option>BRL</option>
    <option>ZAR</option>
    <option>MXN</option>
    <option>SGD</option>
    <option>HKD</option>
  </select>

  <br><br>

  <button onclick="convert()">Preveď</button>

  <p id="result"></p>

  <script>
    function convert() {
      var amount = document.getElementById("amount").value;
      var from = document.getElementById("from").value;
      var to = document.getElementById("to").value;

      if (amount == "") {
        alert("Zadaj sumu");
        return;
      }

      fetch("https://api.exchangerate-api.com/v4/latest/" + from)
        .then(response => response.json())
        .then(data => {
          var rate = data.rates[to];
          var result = amount * rate;

          document.getElementById("result").innerHTML =
            amount + " " + from + " = " + result.toFixed(2) + " " + to;
        })
        .catch(error => {
          document.getElementById("result").innerHTML = "Chyba";
        });
    }
  </script>

</body>
</html>
